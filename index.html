<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Mithilan Kantharuban</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      background: black;
      height: 100%;
      overflow: hidden;
    }

    body {
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding-top: 6vh;
      padding-left: 4vw;
      background: none;
    }

    h1 {
      color: rgba(255, 255, 255, 0.75);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      text-align: left;
      white-space: nowrap;
      text-shadow: none;
    }

    .short-last { display: none; }

    @media (max-width: 600px) {
      .rudra { display: none; }
      .full-last { display: none; }
      .short-last { display: inline; }
    }

    @media (min-width: 601px) and (max-width: 900px) {
      .rudra { display: none; }
      .full-last { display: inline; }
      .short-last { display: none; }
    }

    .sub {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.3rem;
      color: rgba(255, 255, 255, 0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      margin-top: 0.5rem;
    }

    .sub a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
    }

    .sub a:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    #mute-btn {
      position: fixed;
      bottom: 4vh;
      right: 4vh;
      background: none;
      border: none;
      border-radius: 0;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      width: 28px;
      height: 28px;
      padding: 0;
      z-index: 1;
    }

    #mute-btn:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    #mute-btn svg {
      width: 28px;
      height: 28px;
    }

    .bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('IMG_3669.JPG') center center / cover no-repeat;
      z-index: -1;
    }

    .bg::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.55) 100%
      );
    }

    @media (max-width: 480px) and (orientation: portrait) {
      html {
        overflow: visible;
      }

      body {
        overflow-y: scroll;
        scrollbar-width: none;
        height: calc(100vh + 60px);
        padding-top: calc(3vh + 60px);
      }

      body::-webkit-scrollbar {
        display: none;
      }

      .bg {
        width: 100vh;
        height: 100vw;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(90deg) scale(1.1);
        background-position: center center;
      }

      h1 {
        font-size: clamp(2.2rem, 11vw, 3rem);
      }

      .sub {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        font-size: clamp(1.1rem, 5vw, 1.4rem);
        font-weight: 600;
        text-transform: lowercase;
        gap: 0.2rem;
      }

      .sub .dot {
        display: none;
      }

      .sub a {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      #mute-btn {
        bottom: 2vh;
      }

      .bg::after {
        background: linear-gradient(
          to right,
          rgba(0,0,0,0.55) 0%,
          transparent 30%,
          transparent 70%,
          rgba(0,0,0,0.55) 100%
        );
      }
    }

    .dash { display: none; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <h1>mithilan <span class="rudra">rudra </span><span class="full-last">kantharuban</span><span class="short-last">k</span></h1>
  <div class="sub">
    <span class="item">Bay Area, CA</span>
    <span class="dot"> · </span>
    <span class="item">CS @ NYU</span>
    <span class="dot"> · </span>
    <span class="item"><a href="https://www.linkedin.com/in/mithilan-kantharuban-217426246" target="_blank">LinkedIn</a></span>
    <span class="dot"> · </span>
    <span class="item"><a href="https://www.instagram.com/mithilan.k/" target="_blank">Instagram</a></span>
    <span class="dot"> · </span>
    <span class="item"><a href="https://github.com/MithilanK" target="_blank">GitHub</a></span>
  </div>

  <audio id="bg-audio" loop>
    <source src="audio.mp3" type="audio/mpeg">
  </audio>

  <button id="mute-btn" title="Toggle audio">
    <svg id="icon-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <svg id="icon-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" style="display:none">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </button>

  <script>
    if (window.innerWidth <= 480 && window.innerHeight > window.innerWidth) {
      window.scrollTo(0, 60);
      window.addEventListener('scroll', () => window.scrollTo(0, 60));
    }

    const audio = document.getElementById('bg-audio');
    const btn = document.getElementById('mute-btn');
    const iconOn = document.getElementById('icon-on');
    const iconOff = document.getElementById('icon-off');
    audio.volume = 0.2;

    audio.play().catch(() => {
      const unlock = () => {
        audio.play();
        document.removeEventListener('click', unlock);
        document.removeEventListener('keydown', unlock);
        document.removeEventListener('scroll', unlock);
      };
      document.addEventListener('click', unlock);
      document.addEventListener('keydown', unlock);
      document.addEventListener('scroll', unlock);
    });

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      audio.muted = !audio.muted;
      iconOn.style.display = audio.muted ? 'none' : 'block';
      iconOff.style.display = audio.muted ? 'block' : 'none';
    });
  </script>
</body>
</html>
